{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Erişim Engellendi | CyberPoll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% static 'polls/cyber_theme.css' %}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <div class="bg-gradient-animated"></div>
    <div class="orb orb-1"></div>
    
    <div class="content-wrapper text-center">
        <div class="error-container p-5" style="background: var(--glass); border: 1px solid var(--glass-border); border-radius: 30px; backdrop-filter: blur(20px);">
            <div class="error-icon mb-4" style="font-size: 5rem; color: var(--danger);">
                <i class="bi bi-shield-slash-fill"></i>
            </div>
            <h1 class="display-3 fw-bold mb-3">404</h1>
            <h2 class="h4 mb-4 text-secondary">Bağlantı Kesildi: Aranan Protokol Bulunamadı</h2>
            <p class="mb-5 text-secondary opacity-75">Girmeye çalıştığınız dizin veri tabanımızda mevcut değil veya erişim yetkiniz bulunmuyor.</p>
            <a href="{% url 'polls:index' %}" class="btn-cyber text-decoration-none">Güvenli Bölgeye Dön</a>
        </div>
    </div>
</body>
</html>
