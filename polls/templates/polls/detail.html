{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anket: {{ question.question_text }} — CyberPoll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --accent: #06b6d4;
            --bg-dark: #0f172a; --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(255,255,255,0.12); --text-primary: #f1f5f9;
            --text-secondary: #94a3b8; --success: #22c55e; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        .bg-gradient-animated {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #0f172a 0%, #1e1b4b 25%, #0f172a 50%, #164e63 75%, #0f172a 100%);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite; z-index: 0;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: 0; pointer-events: none; }
        .orb-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; right: -100px; animation: float1 8s ease-in-out infinite; }
        .orb-2 { width: 300px; height: 300px; background: #06b6d4; bottom: -50px; left: -50px; animation: float2 10s ease-in-out infinite; }
        @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-40px,40px); } }
        @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-30px); } }

        .content-wrapper { position: relative; z-index: 1; }

        .navbar-cyber {
            backdrop-filter: blur(20px); background: var(--glass);
            border-bottom: 1px solid var(--glass-border); padding: 1rem 0;
        }
        .navbar-brand-cyber {
            font-weight: 800; font-size: 1.4rem; color: var(--text-primary) !important;
            display: flex; align-items: center; gap: 0.5rem; text-decoration: none;
        }
        .navbar-brand-cyber .brand-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }

        .detail-wrapper { max-width: 720px; margin: 0 auto; padding: 3rem 1rem 4rem; }
        .back-link { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem; }
        .back-link:hover { color: var(--primary-light); }

        .question-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 1.5rem; overflow: hidden;
            backdrop-filter: blur(20px); animation: fadeInUp 0.6s ease;
        }
        .question-header {
            padding: 2rem 2.5rem; border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 1rem;
        }
        .question-header .q-icon {
            width: 56px; height: 56px; border-radius: 16px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .question-header h1 { font-size: 1.3rem; font-weight: 700; margin: 0; line-height: 1.4; }

        .question-body { padding: 2rem 2.5rem 2.5rem; }
        .section-label {
            display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1.5rem;
        }

        .choices-list { list-style: none; padding: 0; margin: 0 0 2rem; }
        .choice-item {
            position: relative; margin-bottom: 0.75rem;
        }
        .choice-item input[type="radio"] { display: none; }
        .choice-item label {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.5rem; border-radius: 1rem;
            background: rgba(255,255,255,0.03); border: 1.5px solid var(--glass-border);
            cursor: pointer; transition: all 0.3s ease; font-size: 0.95rem; font-weight: 500;
        }
        .choice-item label:hover {
            background: rgba(99,102,241,0.08); border-color: var(--primary);
            transform: translateX(6px);
        }
        .choice-item input[type="radio"]:checked + label {
            background: rgba(99,102,241,0.15); border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99,102,241,0.15);
        }
        .choice-item input[type="radio"]:checked + label .radio-dot { background: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.3); }

        .radio-dot {
            width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid var(--glass-border); transition: all 0.3s;
        }

        .error-msg {
            background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem; padding: 1rem 1.25rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: #fca5a5;
        }

        .submit-btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none; color: white; padding: 0.9rem 2.5rem;
            border-radius: 50px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s; font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .question-header, .question-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient-animated"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="content-wrapper">
        <nav class="navbar-cyber">
            <div class="container d-flex justify-content-between align-items-center">
                <a href="{% url 'polls:index' %}" class="navbar-brand-cyber">
                    <span class="brand-icon"><i class="bi bi-shield-lock-fill"></i></span>
                    CyberPoll
                </a>
            </div>
        </nav>

        <div class="detail-wrapper">
            <a href="{% url 'polls:index' %}" class="back-link">
                <i class="bi bi-arrow-left"></i> Tüm Anketlere Dön
            </a>

            <div class="question-card">
                <div class="question-header">
                    <div class="q-icon"><i class="bi bi-shield-check"></i></div>
                    <h1>{{ question.question_text }}</h1>
                </div>
                <div class="question-body">
                    <form action="{% url 'polls:vote' question.id %}" method="post">
                        {% csrf_token %}
                        <span class="section-label">Seçenekler</span>

                        {% if error_message %}
                            <div class="error-msg">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                {{ error_message }}
                            </div>
                        {% endif %}

                        <ul class="choices-list">
                        {% for choice in question.choice_set.all %}
                            <li class="choice-item">
                                <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
                                <label for="choice{{ forloop.counter }}">
                                    <span class="radio-dot"></span>
                                    {{ choice.choice_text }}
                                </label>
                            </li>
                        {% endfor %}
                        </ul>

                        <div class="text-end">
                            <button type="submit" class="submit-btn">
                                Görüşümü Kaydet <i class="bi bi-send-fill"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Ripple effect on choice selection
        document.querySelectorAll('.choice-item label').forEach(label => {
            label.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.style.cssText = `position:absolute;border-radius:50%;background:rgba(99,102,241,0.3);transform:scale(0);animation:ripple 0.6s ease-out;pointer-events:none;width:100px;height:100px;left:${e.offsetX-50}px;top:${e.offsetY-50}px;`;
                this.closest('.choice-item').style.position = 'relative';
                this.closest('.choice-item').style.overflow = 'hidden';
                this.closest('.choice-item').appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Add ripple keyframe dynamically
        const style = document.createElement('style');
        style.textContent = '@keyframes ripple { to { transform: scale(4); opacity: 0; } }';
        document.head.appendChild(style);
    </script>
</body>
</html>
